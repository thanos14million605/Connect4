<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gray-900 text-white flex items-center justify-center min-h-screen"
  >
    <div class="text-center">
      <h1 class="text-4xl font-bold mb-6">Connect 4</h1>

      <div
        id="board"
        class="grid grid-cols-7 gap-2 bg-blue-700 p-4 rounded-2xl shadow-lg"
      ></div>

      <p id="status" class="mt-4 text-xl font-semibold">
        Player 1's Turn (Red)
      </p>

      <button
        onclick="resetGame()"
        class="mt-4 px-6 py-2 bg-yellow-500 hover:bg-yellow-600 rounded-xl font-semibold"
      >
        Restart Game
      </button>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
